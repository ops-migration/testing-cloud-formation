AWSTemplateFormatVersion: '2010-09-09'
Description: 'ECR Repository for Docker Images'

Parameters:
  Environment:
    Type: String
    Description: Environment name
  ApplicationName:
    Type: CommaDelimitedList
    Description: Name of the application
  ImageTagMutability:
    Type: String
    AllowedValues: [MUTABLE, IMMUTABLE]
    Default: MUTABLE
  ScanOnPush:
    Type: String
    AllowedValues: ['true', 'false']
    Default: 'true'
  LifecyclePolicyText:
    Type: String
    Default: |
      {
        "rules": [
          {
            "rulePriority": 1,
            "description": "Keep last 20 images",
            "selection": {
              "tagStatus": "any",
              "countType": "imageCountMoreThan",
              "countNumber": 20
            },
            "action": { "type": "expire" }
          }
        ]
      }

Resources:
  ECRRepository0:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub           # ✅ !Sub + variable map replaces bare !Select
        - '${Environment}-${AppName}'
        - AppName: !Select [0, !Ref ApplicationName]
      ImageTagMutability: !Ref ImageTagMutability
      ImageScanningConfiguration:
        ScanOnPush: !Ref ScanOnPush
      LifecyclePolicy:
        LifecyclePolicyText: !Ref LifecyclePolicyText
      Tags:
        - Key: Name
          Value: !Sub              # ✅ Fixed: was incorrectly using index 1
            - '${AppName}'
            - AppName: !Select [0, !Ref ApplicationName]
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: !Sub              # ✅ Fixed: !Ref on CommaDelimitedList returns raw "a,b" string
            - '${AppName}'
            - AppName: !Select [0, !Ref ApplicationName]
        - Key: ManagedBy
          Value: CloudFormation

  ECRRepository1:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub
        - '${Environment}-${AppName}'
        - AppName: !Select [1, !Ref ApplicationName]
      ImageTagMutability: !Ref ImageTagMutability
      ImageScanningConfiguration:
        ScanOnPush: !Ref ScanOnPush
      LifecyclePolicy:
        LifecyclePolicyText: !Ref LifecyclePolicyText
      Tags:
        - Key: Name
          Value: !Sub
            - '${AppName}'
            - AppName: !Select [1, !Ref ApplicationName]
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: !Sub
            - '${AppName}'
            - AppName: !Select [1, !Ref ApplicationName]
        - Key: ManagedBy
          Value: CloudFormation

Outputs:
  RepositoryName0:
    Description: Name of ECR Repository 0
    Value: !Ref ECRRepository0
    Export:
      Name: !Sub '${AWS::StackName}-RepositoryName0'   # ✅ Already correct !Sub usage

  RepositoryName1:
    Description: Name of ECR Repository 1
    Value: !Ref ECRRepository1
    Export:
      Name: !Sub '${AWS::StackName}-RepositoryName1'
