AWSTemplateFormatVersion: '2010-09-09'
Description: IAM Stack - ECS Task Role

Parameters:
  Environment:
    Type: String
  AppName:
    Type: String
  TaskRolePolicyJson:
    Type: String
    Description: S3 URI of the task policy JSON file (e.g. s3://my-bucket/task-policy.json)

Resources:
  ECSTaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${Environment}-${AppName}-task-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: !Sub ${Environment}-${AppName}-task-policy
          PolicyDocument:
            'Fn::Transform':
              Name: AWS::Include
              Parameters:
                Location: !Ref TaskRolePolicyJson

Outputs:
  TaskRoleArn:
    Description: Task Role ARN
    Value: !GetAtt ECSTaskRole.Arn
    Export:
      Name: !Sub ${AWS::StackName}-TaskRoleArn
