AWSTemplateFormatVersion: '2010-09-09'
Description: ECS Cluster Stack - Deploys ECS Cluster backed by EC2 ASG

Resources:
  ECSStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: https://ecs-migration-cloud-formation-templates.s3.us-east-1.amazonaws.com/templates/ecs.yaml
      Parameters:
        Environment: dev
        VpcId: '{{resolve:ssm:/cfn/vpc/VpcId}}'
        PrivateSubnet1: '{{resolve:ssm:/cfn/vpc/PrivateSubnet1}}'
        PrivateSubnet2: '{{resolve:ssm:/cfn/vpc/PrivateSubnet2}}'
        KeyPairName: dev-ecs-keypair
        InstanceType: m7i-flex.large
        ALBSecurityGroup: '{{resolve:ssm:/cfn/dev/alb/SecurityGroupId}}'
        ALBTargetGroupArn: '{{resolve:ssm:/cfn/dev/alb/TargetGroupArn}}'
      Tags:
        - Key: Environment
          Value: dev
        - Key: ManagedBy
          Value: CloudFormation
